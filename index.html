<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>的士駕駛生意紀錄</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        h2 { text-align: center; margin-top: 0; color: #1c1c1e; }
        .status-tracker { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        button {
            font-size: 18px; font-weight: 600; padding: 16px; border: none; border-radius: 12px;
            cursor: pointer; transition: all 0.2s ease; width: 100%; -webkit-tap-highlight-color: transparent;
        }
        button:not(:disabled) { background-color: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        button:not(:disabled):active { transform: scale(0.98); opacity: 0.9; }
        button:disabled { background-color: #e5e5ea; color: #aeaeae; cursor: not-allowed; }
        #btn-finish:not(:disabled) { background-color: var(--success); box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3); }
        
        /* 取消訂單按鈕專用樣式 */
        .btn-cancel-order {
            background-color: var(--danger) !important;
            box-shadow: 0 4px 10px rgba(255, 59, 48, 0.3) !important;
            margin-top: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        /* 彈出視窗樣式 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 24px; border-radius: 16px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .modal-content h3 { margin-top: 0; margin-bottom: 20px; }
        .source-options { display: flex; flex-direction: column; gap: 12px; }
        .btn-option { background-color: #f2f2f7 !important; color: #007aff !important; box-shadow: none !important; }
        .btn-option:active { background-color: #e5e5ea !important; }
        
        /* 輸入框樣式 */
        .custom-input {
            width: 100%; font-size: 20px; padding: 12px; text-align: center; border: 1px solid #d1d1d6;
            border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; -webkit-appearance: none;
        }

        /* 彈窗按鈕群組（確認/取消） */
        .modal-btn-group { display: flex; gap: 12px; }
        .modal-btn-group button { font-size: 16px; padding: 12px; }
        .btn-modal-cancel { background-color: #e5e5ea !important; color: #333333 !important; box-shadow: none !important; }

        /* 底部管理區域 */
        .admin-section { border-top: 1px solid #e5e5ea; padding-top: 20px; text-align: center; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action { font-size: 15px; padding: 12px; margin: 0; }
        .btn-show { background-color: var(--primary) !important; color: white !important; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.2); }
        .btn-clear { background-color: #e5e5ea !important; color: var(--danger) !important; }
        
        /* 紀錄顯示方塊 */
        .record-display-box { display: block; margin-top: 15px; background: #f8f8fa; padding: 15px; border-radius: 12px; border: 1px solid #e5e5ea; }
        textarea { width: 100%; height: 200px; font-family: monospace; font-size: 13px; border: 1px solid #d1d1d6; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; background: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>的士生意紀錄系統</h2>
    
    <div class="status-tracker">
        <button id="btn-order" onclick="recordStatus(1, '接單')">1. 接單</button>
        <button id="btn-arrive" onclick="recordStatus(2, '到達起點')" disabled>2. 到達起點</button>
        <button id="btn-finish" onclick="recordStatus(3, '到達目的地')" disabled>3. 到達目的地</button>
        
        <button id="btn-cancel-trip" class="btn-cancel-order" onclick="cancelCurrentTrip()">取消當前訂單</button>
    </div>

    <div class="admin-section">
        <div class="btn-group">
            <button class="btn-action btn-show" onclick="copyToClipboard()">📋 一鍵複製全部紀錄</button>
            <button class="btn-action btn-clear" onclick="clearRecords()">清除紀錄 (收工)</button>
        </div>
        <div id="log-count" style="font-size: 14px; color: #636366; margin-bottom: 10px;">目前已儲存: 0 條完整紀錄</div>
        
        <div id="record-box" class="record-display-box">
            <textarea id="txt-records" readonly placeholder="暫無紀錄..."></textarea>
        </div>
    </div>
</div>

<div id="source-modal" class="modal">
    <div class="modal-content">
        <h3>請選擇訂單來源</h3>
        <div class="source-options">
            <button class="btn-option" style="background-color: #e5f1ff !important; font-weight: bold;" onclick="selectSource('街客')">街客 (直接跳關)</button>
            <button class="btn-option" onclick="selectSource('Uber')">Uber</button>
            <button class="btn-option" onclick="selectSource('高德')">高德</button>
            <button class="btn-option" style="color: #636366 !important;" onclick="openCustomSourceModal()">其他...</button>
        </div>
    </div>
</div>

<div id="custom-source-modal" class="modal">
    <div class="modal-content">
        <h3>輸入平台名稱</h3>
        <input type="text" id="input-custom-source" class="custom-input" placeholder="其他" value="其他">
        <button onclick="submitCustomSource()">確定</button>
    </div>
</div>

<div id="fare-modal" class="modal">
    <div class="modal-content">
        <h3>輸入本單收入 ($)</h3>
        <input type="number" id="input-fare" class="custom-input" pattern="[0-9]*" inputmode="numeric" placeholder="0" min="0">
        <div class="modal-btn-group">
            <button class="btn-modal-cancel" onclick="cancelFareInput()">取消</button>
            <button onclick="submitFare()">確定儲存</button>
        </div>
    </div>
</div>

<script>
    let currentStep = 1;
    let currentTripData = {};
    let allRecords = JSON.parse(localStorage.getItem('taxi_records')) || [];

    let savedStep = localStorage.getItem('taxi_current_step');
    let savedTripData = localStorage.getItem('taxi_current_trip_data');
    if (savedStep && savedTripData) {
        currentStep = parseInt(savedStep);
        currentTripData = JSON.parse(savedTripData);
    }

    function updateUI() {
        document.getElementById('btn-order').disabled = (currentStep !== 1);
        document.getElementById('btn-arrive').disabled = (currentStep !== 2);
        document.getElementById('btn-finish').disabled = (currentStep !== 3);
        
        if (currentStep > 1) {
            document.getElementById('btn-cancel-trip').style.display = 'block';
        } else {
            document.getElementById('btn-cancel-trip').style.display = 'none';
        }
        
        document.getElementById('log-count').innerText = `目前已儲存: ${allRecords.length} 條完整紀錄`;
        generateTextRecords();
    }

    function saveCurrentState() {
        localStorage.setItem('taxi_current_step', currentStep);
        localStorage.setItem('taxi_current_trip_data', JSON.stringify(currentTripData));
    }

    function clearCurrentState() {
        localStorage.removeItem('taxi_current_step');
        localStorage.removeItem('taxi_current_trip_data');
    }

    function recordStatus(step, statusName) {
        if (step !== currentStep) return;

        const btns = [document.getElementById('btn-order'), document.getElementById('btn-arrive'), document.getElementById('btn-finish')];
        const currentBtn = btns[step-1];
        const originalText = currentBtn.innerText;
        currentBtn.innerText = "定位中...";
        currentBtn.disabled = true;

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const locString = `${lat},${lng}`;
                
                const now = new Date();
                const timeString = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                currentTripData[`${statusName}時間`] = timeString;
                currentTripData[`${statusName}地點`] = locString;

                currentBtn.innerText = originalText;

                if (step === 1) {
                    document.getElementById('source-modal').style.display = 'flex';
                } else if (step < 3) {
                    currentStep++;
                    saveCurrentState();
                    updateUI();
                } else {
                    document.getElementById('fare-modal').style.display = 'flex';
                    const fareInput = document.getElementById('input-fare');
                    fareInput.value = '';
                    setTimeout(() => fareInput.focus(), 100);
                }
            },
            (error) => {
                currentBtn.innerText = originalText;
                let errorMsg = "定位失敗";
                if (error.code === error.PERMISSION_DENIED) errorMsg = "請開啟瀏覽器的定位權限。";
                alert(errorMsg);
                updateUI();
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    function selectSource(sourceName) {
        currentTripData['訂單來源'] = sourceName;
        document.getElementById('source-modal').style.display = 'none';
        
        if (sourceName === '街客') {
            currentTripData['到達起點時間'] = currentTripData['接單時間'];
            currentTripData['到達起點地點'] = currentTripData['接單地點'];
            currentStep = 3;
        } else {
            currentStep = 2;
        }
        
        saveCurrentState();
        updateUI();
    }

    function openCustomSourceModal() {
        document.getElementById('source-modal').style.display = 'none';
        document.getElementById('custom-source-modal').style.display = 'flex';
        const input = document.getElementById('input-custom-source');
        input.value = '其他';
        setTimeout(() => {
            input.focus();
            input.select();
        }, 100);
    }

    function submitCustomSource() {
        const customValue = document.getElementById('input-custom-source').value.trim();
        const finalSource = customValue ? customValue : '其他';
        document.getElementById('custom-source-modal').style.display = 'none';
        selectSource(finalSource);
    }

    function cancelCurrentTrip() {
        const check = confirm("❌ 確定要取消當前這筆訂單嗎？\n此訂單的數據將會被捨棄，且不作任何歷史紀錄。");
        if (check) {
            currentTripData = {};
            currentStep = 1;
            clearCurrentState();
            updateUI();
            alert('當前訂單已取消，已重置回接單狀態。');
        }
    }

    // 新增：收入輸入的取消功能
    function cancelFareInput() {
        // 隱藏彈窗
        document.getElementById('fare-modal').style.display = 'none';
        // 移除剛剛誤觸產生的「到達目的地」數據，退回未點擊前的狀態
        delete currentTripData['到達目的地時間'];
        delete currentTripData['到達目的地地點'];
        // 保持 currentStep = 3（即仍可重新按「3. 到達目的地」）
        updateUI();
    }

    function submitFare() {
        const fareValue = document.getElementById('input-fare').value;
        currentTripData['收入'] = fareValue ? parseFloat(fareValue) : 0;
        
        document.getElementById('fare-modal').style.display = 'none';
        
        allRecords.push({...currentTripData});
        localStorage.setItem('taxi_records', JSON.stringify(allRecords));
        
        currentTripData = {};
        currentStep = 1;
        clearCurrentState();
        alert('本單紀錄完成，營收已儲存！');
        updateUI();
    }

    function generateTextRecords() {
        let output = "";
        allRecords.forEach((row, index) => {
            output += `${index + 1}. ${row['訂單來源'] || '未知平台'}\n`;
            output += `接單時間: ${row['接單時間'] || ''}\n`;
            output += `接單地點: ${row['接單地點'] || ''}\n`;
            output += `到達起點時間: ${row['到達起點時間'] || ''}\n`;
            output += `到達起點地點: ${row['到達起點地點'] || ''}\n`;
            output += `到達目的地時間: ${row['到達目的地時間'] || ''}\n`;
            output += `到達目的地地點: ${row['到達目的地地點'] || ''}\n`;
            output += `收入: $${row['收入'] !== undefined ? row['收入'] : 0}\n\n`;
        });
        document.getElementById('txt-records').value = output.trim();
    }

    function clearRecords() {
        if (allRecords.length === 0) { alert('目前沒有紀錄可以清除。'); return; }
        const check = confirm("⚠️ 確定要清除今日的所有紀錄嗎？\n清除後將無法復原！");
        if (check) {
            allRecords = [];
            localStorage.removeItem('taxi_records');
            currentTripData = {};
            currentStep = 1;
            clearCurrentState();
            updateUI();
            alert('紀錄已清空，祝收工愉快！');
        }
    }

    function copyToClipboard() {
        const textarea = document.getElementById('txt-records');
        if (!textarea.value) { alert('沒有紀錄可以複製！'); return; }
        textarea.select();
        textarea.setSelectionRange(0, 99999);
        try {
            navigator.clipboard.writeText(textarea.value).then(() => { alert('已成功複製到剪貼簿！'); });
        } catch (err) {
            document.execCommand('copy');
            alert('已成功複製到剪貼簿！');
        }
    }

    updateUI();
</script>

</body>
</html>
